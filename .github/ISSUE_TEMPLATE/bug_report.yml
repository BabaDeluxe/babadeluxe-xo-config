name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out this template.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: Clear description of what the bug is
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the bug
      placeholder: |
        1. Go to...
        2. Click on...
        3. Scroll down to...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, version info
      placeholder: |
        - Browser: Chrome 120
        - OS: Windows 11
        - App Version: 1.2.3

  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - Low - Minor issue
        - Medium - Affects functionality
        - High - Blocks important features
        - Critical - App unusable
    validations:
      required: true
